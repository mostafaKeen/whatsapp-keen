<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp CRM Context</title>
    <link rel="stylesheet" href="style.css">
    <script src="//api.bitrix24.com/api/v1/"></script>
    <style>
        body { background: transparent; padding: 0; margin: 0; }
        .chat-interface { height: 100vh; border-radius: 0; border: none; }
        .sidebar-sessions, .sidebar-chats { display: none !important; }
        .main-chat { border-left: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Main Chat Area Only -->
        <main class="main-chat" id="main-chat">
            <div id="chat-header" class="chat-header">
                <div class="chat-avatar"></div>
                <div class="chat-title">
                    <h3 id="current-chat-name">Connecting...</h3>
                    <span id="current-chat-id" class="text-xs text-muted"></span>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages"></div>
            
            <div class="chat-input-area">
                <button id="attach-btn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input type="file" id="file-input" class="hidden" />
                <textarea id="msg-body" placeholder="Type a message..." autocomplete="off" rows="1"></textarea>
                <button id="send-msg-btn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script>
        // Specific logic for placement mode
        window.addEventListener('load', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const domain = urlParams.get('domain');
            const entityId = urlParams.get('entityId');
            const entityType = urlParams.get('entityType');
            const authId = urlParams.get('authId');

            if (!domain || !authId) {
                document.body.innerHTML = '<div class="center-p">Missing authentication. Please open from Bitrix24.</div>';
                return;
            }

            // Hide sidebars via JS just in case CSS fails
            document.querySelector('.sidebar-sessions')?.remove();
            document.querySelector('.sidebar-chats')?.remove();

            // Set global auth for app.js
            window.bitrixContext = { domain, authId, entityId, entityType };
            
            // Initiate session for this domain
            initiateSession(domain);

            // Fetch CRM Entity phone number if we are in a placement
            if (entityId && entityType) {
                // We'll need a specialized endpoint or just use BX24.callMethod from frontend
                BX24.init(async () => {
                    const method = entityType === 'deal' ? 'crm.deal.get' : 'crm.lead.get';
                    BX24.callMethod(method, { id: entityId }, (res) => {
                        const data = res.data();
                        let phone = '';
                        if (data.PHONE && data.PHONE.length > 0) {
                            phone = data.PHONE[0].VALUE.replace(/\D/g, '');
                            const chatId = phone + '@c.us';
                            const name = (data.NAME || '') + ' ' + (data.LAST_NAME || '') || data.TITLE || 'Customer';
                            
                            // Load this chat specifically
                            setTimeout(() => selectChat(chatId, name), 1000); 
                        } else {
                            document.getElementById('current-chat-name').textContent = "No phone number found";
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
